name: SPX LLM Vision Trader CI

on:
  push:
    paths:
      - "SPX_LLM_VISION_TRADER/**"
      - ".github/workflows/spx_llm_vision_trader_ci.yml"
  pull_request:
    paths:
      - "SPX_LLM_VISION_TRADER/**"
      - ".github/workflows/spx_llm_vision_trader_ci.yml"
  workflow_dispatch:

jobs:
  health-check:
    name: Python health check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SPX_LLM_VISION_TRADER
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile project
        run: python -m compileall .

      - name: Run strict-mode scan
        run: python main.py --test-strict

      - name: Test database initialization
        run: python main.py --test-db
